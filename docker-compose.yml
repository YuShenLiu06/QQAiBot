# QQ AI 机器人：NapCat (QQ 底层) + AstrBot (AI + WebUI 管理面板)
# 基于 NapCat 官方 compose/astrbot.yml 增强：补时区、取消注释 6199、napcat 不再挂 data
# 部署：  docker compose up -d
# 取token: docker compose logs napcat | grep -i token
# 面板:    http://127.0.0.1:6185   NapCat WebUI: http://127.0.0.1:6099
services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - MODE=astrbot            # 自动预填反向WS客户端 -> ws://astrbot:6199/ws；未生效则手动加
      - TZ=Asia/Shanghai
      # - ACCOUNT=10001         # 可选：预填机器人QQ号（仍需WebUI扫码登录）
    ports:
      - "6099:6099"             # NapCat WebUI（扫码登录/查token）
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./ntqq:/app/.config/QQ
    networks: [astrbot_network]

  astrbot:
    image: soulter/astrbot:latest
    container_name: astrbot
    restart: always
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6185:6185"             # AstrBot WebUI 管理面板（配模型/人设/插件/日志）
      - "6199:6199"             # OneBot v11 反向WS服务端（NapCat 连这里；服务器勿公网暴露）
    volumes:
      - ./data:/AstrBot/data    # 配置/人格/插件/DB 全部持久化在此
    networks: [astrbot_network]

networks:
  astrbot_network:
    driver: bridge
